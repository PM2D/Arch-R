# R36S Gamepad (gpio-keys) — Arch R
# Kernel 6.6 mainline gpio-keys driver
# Button IDs from es_input.cfg (sequential evdev registration order)

input_driver = "udev"
input_device = "gpio-keys"
input_device_display_name = "R36S Gamepad"

# Face buttons (same as dArkOS retrogame_joypad)
input_b_btn = "0"
input_a_btn = "1"
input_y_btn = "2"
input_x_btn = "3"

# Shoulders
input_l_btn = "4"
input_r_btn = "5"
input_l2_btn = "6"
input_r2_btn = "7"

# Select / Start / Hotkey
input_select_btn = "8"
input_start_btn = "9"
input_enable_hotkey_btn = "10"

# Thumbstick clicks
input_l3_btn = "11"
input_r3_btn = "12"

# D-Pad
input_up_btn = "13"
input_down_btn = "14"
input_left_btn = "15"
input_right_btn = "16"

# Labels
input_b_btn_label = "B"
input_a_btn_label = "A"
input_y_btn_label = "Y"
input_x_btn_label = "X"
input_l_btn_label = "L1"
input_r_btn_label = "R1"
input_l2_btn_label = "L2"
input_r2_btn_label = "R2"
input_select_btn_label = "Select"
input_start_btn_label = "Start"
input_enable_hotkey_btn_label = "Mode"
input_l3_btn_label = "L3"
input_r3_btn_label = "R3"
input_up_btn_label = "D-Pad Up"
input_down_btn_label = "D-Pad Down"
input_left_btn_label = "D-Pad Left"
input_right_btn_label = "D-Pad Right"

# Arch R ALSA configuration for RK3326 (rk817 codec)
# Simple plug → hw:0,0 — no dmix needed (SDL_mixer handles mixing internally)
# dmix was causing issues: SDL_mixer couldn't reliably play through the dmix layer
# dArkOS also removes dmix (.asoundrc) for game launch via perfmax
pcm.!default {
    type plug
    slave.pcm "hw:0,0"
}
ctl.!default {
    type hw
    card 0
}
